name: Build Bullethole Docker Image

on:
  push:
    branches: [main]
    paths:
      - bullethole_bot.py
      - bullethole_run.py
      - Dockerfile.bullethole
      - stencil_transform.py

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.bullethole
          push: true
          tags: ghcr.io/a-u-supply/bullethole:latest
