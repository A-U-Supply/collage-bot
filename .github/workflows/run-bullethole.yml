name: Run Collage Stencil Bullet Hole Bot

on:
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'
      chaos:
        description: 'Circle size and count (0.0 = few large, 1.0 = many small)'
        default: '0.5'
      count:
        description: 'Number of circles (0 = derive from chaos)'
        default: '0'
      size:
        description: 'Circle radius as fraction of image width, e.g. 0.15 = 15% (0 = derive from chaos)'
        default: '0'
      placement:
        description: 'Circle placement mode'
        default: 'random'
        type: choice
        options:
          - random
          - grid
          - hex
          - radial
      jitter:
        description: 'Randomness added to structured placements (0.0 = exact, 1.0 = maximum)'
        default: '0.0'
      effect:
        description: 'Effect applied inside each circle'
        default: 'rotate'
        type: choice
        options:
          - rotate
          - invert
          - blur
          - grayscale
          - pixelate
          - fill_black
          - fill_white
      no_overlap:
        description: 'Prevent circles from overlapping (true/false)'
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collage stencil bullet hole bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python bullethole_bot.py \
            --source-channel "${{ inputs.source_channel }}" \
            --post-channel "${{ inputs.post_channel }}" \
            --chaos "${{ inputs.chaos }}" \
            --count "${{ inputs.count }}" \
            --size "${{ inputs.size }}" \
            --placement "${{ inputs.placement }}" \
            --jitter "${{ inputs.jitter }}" \
            --effect "${{ inputs.effect }}" \
            ${{ inputs.no_overlap == 'true' && '--no-overlap' || '' }}
