name: Run Collage Stencil Bot

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC daily
  workflow_dispatch:
    inputs:
      source_channel:
        description: 'Channel to fetch images from'
        default: 'image-gen'
      post_channel:
        description: 'Channel to post results to'
        default: 'img-junkyard'

jobs:
  stencil:
    runs-on: ubuntu-latest
    outputs:
      message_ts: ${{ steps.run.outputs.message_ts }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collage stencil bot
        id: run
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          output=$(python stencil_bot.py \
            --source-channel "${{ inputs.source_channel || 'image-gen' }}" \
            --post-channel "${{ inputs.post_channel || 'img-junkyard' }}")
          echo "$output"
          ts=$(echo "$output" | grep "^MESSAGE_TS=" | cut -d= -f2)
          echo "message_ts=$ts" >> $GITHUB_OUTPUT

  gif:
    needs: stencil
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collage stencil GIF bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python gif_bot.py \
            --channel "${{ inputs.post_channel || 'img-junkyard' }}" \
            --message-ts "${{ needs.stencil.outputs.message_ts }}" \
            --frame-duration 300
